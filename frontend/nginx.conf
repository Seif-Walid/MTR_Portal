server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Same-origin proxy to the backend, exactly like the Vite dev proxy —
    # the browser only ever talks to this origin, so the session cookie
    # and CORS both just work with zero extra config.
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React Router: let the app handle unknown paths client-side.
    location / {
        try_files $uri /index.html;
    }
}
